<!-- templates/post.html -->
<article class="post" itemscope itemtype="http://schema.org/BlogPosting">
	<header>
		<h1 class="post-title general-title" itemprop="headline">$title$</h1>
		$if(subtitle)$
		<p class="post-subtitle" itemprop="description"><i>$subtitle$</i></p>
		$endif$ $if(image)$
		<figure class="post-hero" itemprop="image" itemscope itemtype="http://schema.org/ImageObject">
			<img
				src="$image$"
				alt="$imageAlt$"
				class="post-hero-image"
				loading="eager"
				width="1600"
				height="900"
				itemprop="url"
			/>
			$if(imageCaption)$
			<figcaption class="post-hero-caption">$imageCaption$</figcaption>
			$endif$
		</figure>
		$endif$
		<!-- Grouped Meta Data -->
		<div class="post-meta-header">
			<div class="post-meta-row">
				<time class="post-meta-date" datetime="$dateIso$" itemprop="datePublished">
					<svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256">
						<path
							d="M208,32H184V24a8,8,0,0,0-16,0v8H88V24a8,8,0,0,0-16,0v8H48A16,16,0,0,0,32,48V208a16,16,0,0,0,16,16H208a16,16,0,0,0,16-16V48A16,16,0,0,0,208,32ZM72,48v8a8,8,0,0,0,16,0V48h80v8a8,8,0,0,0,16,0V48h24V80H48V48ZM208,208H48V96H208V208Z"
						></path>
					</svg>
					<span>$date$</span>
				</time>
				$if(readingTime)$
				<span class="meta-separator" aria-hidden="true">â€˘</span>
				<span class="post-reading-time">
					<span class="material-symbols-outlined" aria-hidden="true">schedule</span>
					$readingTime$ min read
				</span>
				$endif$
			</div>
			<div class="post-authors" itemprop="author" itemscope itemtype="http://schema.org/Person">
				<div class="authors-list">
					<svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 256 256">
						<path
							d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24ZM74.08,197.5a64,64,0,0,1,107.84,0,87.83,87.83,0,0,1-107.84,0ZM96,120a32,32,0,1,1,32,32A32,32,0,0,1,96,120Zm97.76,66.41a79.66,79.66,0,0,0-36.06-28.75,48,48,0,1,0-59.4,0,79.66,79.66,0,0,0-36.06,28.75,88,88,0,1,1,131.52,0Z"
						></path>
					</svg>
					<span itemprop="name">$authors$</span>
				</div>
			</div>
		</div>
	</header>
	<section class="post-content" itemprop="articleBody">$body$</section>

	<hr class="post-divider" />
	<div class="post-footer">
		$if(updated)$
		<div class="post-update-info">
			<!-- Phosphor Icon: ArrowsClockwise (Bold) -->
			<svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" viewBox="0 0 256 256">
				<path
					d="M244,56v48a12,12,0,0,1-12,12H184a12,12,0,1,1,0-24H201.1l-19-17.38c-.13-.12-.26-.24-.38-.37A76,76,0,1,0,127,204h1a75.53,75.53,0,0,0,52.15-20.72,12,12,0,0,1,16.49,17.45A99.45,99.45,0,0,1,128,228h-1.37A100,100,0,1,1,198.51,57.06L220,76.72V56a12,12,0,0,1,24,0Z"
				></path>
			</svg>
			<span>Last updated at <time datetime="$updatedIso$" itemprop="dateModified">$updated$</time></span>
		</div>
		$endif$
	</div>
</article>
