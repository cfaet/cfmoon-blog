<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />

		<meta name="creators" content="$creators$" />
		<meta name="description" content="$metaDescription$" />
		<meta name="generator" content="Hakyll" />
		<script>
			(() => {
				try {
					const savedTheme = localStorage.getItem("theme");
					const theme =
						savedTheme === "light" || savedTheme === "dark"
							? savedTheme
							: matchMedia("(prefers-color-scheme: dark)").matches
								? "dark"
								: "light";
					document.documentElement.dataset.theme = theme;
				} catch {
					document.documentElement.dataset.theme = "light";
				}
			})();
		</script>
		<title>$metaTitle$</title>
		<meta property="og:type" content="$metaType$" />
		<meta property="og:url" content="$siteRoot$$cleanUrl$" />
		<meta property="og:title" content="$metaTitle$" />
		<meta property="og:description" content="$metaDescription$" />
		<meta property="og:image" content="$metaImage$" />
		<meta property="og:image:alt" content="$metaImageAlt$" />
		<meta property="og:image:width" content="1500" />
		<meta property="og:image:height" content="500" />
		$if(isArticle)$
		<meta property="article:published_time" content="$atomDate$" />
		<meta property="article:modified_time" content="$updatedIso$" />
		<meta property="article:author" content="$authors$" />
		$endif$

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:url" content="$siteRoot$$cleanUrl$" />
		<meta name="twitter:title" content="$metaTitle$" />
		<meta name="twitter:description" content="$metaDescription$" />
		<meta name="twitter:image" content="$metaImage$" />
		<meta name="twitter:image:alt" content="$metaImageAlt$" />

		<!-- Favicon -->
		<link rel="icon" type="image/svg+xml" href="/static/images/icon-v1.svg" />

		<!-- Material Icon Packs -->
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
		/>

		<!-- Stylesheets -->
		<link rel="stylesheet" href="https://unpkg.com/@picocss/pico@2.0.6/css/pico.min.css" />
		<link rel="stylesheet" href="/static/css/main.css" />
		<link rel="stylesheet" href="/static/css/syntax.css" />
		<script src="/static/js/main.js" defer></script>

		<!-- Preload critical assets -->
		<link
			rel="preload"
			href="/static/images/logo-horizontal-dark-latest-large-v2.svg"
			as="image"
			type="image/svg+xml"
		/>
	</head>
	<body>
		$partial("templates/header.html")$
		<main class="container">$body$</main>
		$partial("templates/footer.html")$
	</body>
</html>
