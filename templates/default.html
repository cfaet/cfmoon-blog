<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<meta name="creators" content="$creators$" />
		<meta name="description" content="A blog by $family$ | $bound$" />
		<meta name="generator" content="Hakyll" />
		<title>$mTitle$ - $title$</title>
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://cfmoon.net$url$" />
		<meta property="og:title" content="$mTitle$ - $title$" />
		<meta property="og:description" content="$mDescription$" />
		<meta property="og:image" content="https://cfmoon.pages.dev/static/images/og-image-v2.png" />
		<meta property="og:image:width" content="1500" />
		<meta property="og:image:height" content="500" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:url" content="https://cfmoon.net$url$" />
		<meta name="twitter:title" content="$mTitle$ - $title$" />
		<meta name="twitter:description" content="$mDescription$" />
		<meta name="twitter:image" content="https://cfmoon.net/static/images/og-image.png" />

		<!-- Favicon -->
		<link rel="icon" type="image/svg+xml" href="/static/images/icon-v1.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="/static/images/favicon-32x32.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/static/images/apple-touch-icon.png" />

		<!-- Material Icon Packs -->
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
		/>

		<!-- Stylesheets -->
		<link rel="stylesheet" href="https://unpkg.com/@picocss/pico@latest/css/pico.min.css" />
		<link rel="stylesheet" href="/static/css/main.css" />
		<link rel="stylesheet" href="/static/css/syntax.css" />

		<!-- Preload critical assets -->
		<link
			rel="preload"
			href="/static/images/logo-horizontal-dark-latest-large-v2.svg"
			as="image"
			type="image/svg+xml"
		/>
	</head>
	<body>
		$partial("templates/header.html")$
		<main class="container">$body$</main>
		$partial("templates/footer.html")$
	</body>
</html>
