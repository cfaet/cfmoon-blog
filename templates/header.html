<header class="site-header container-fluid">
	<div class="header-wrapper">
		<div class="site-branding">
			<a href="/" class="brand-link">
				<img
					src="/static/images/logo-horizontal-dark-latest-large-v2-path-text.svg"
					alt="The Aleph Project - Homepage"
					class="site-logo"
					width="350"
					loading="eager"
				/>
			</a>
		</div>
		<nav class="main-nav" id="main-nav" aria-label="Main navigation">
			<button
				class="nav-toggle"
				aria-controls="main-nav"
				aria-expanded="false"
				aria-label="Open main menu"
			>
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" class="nav-icon icon-menu">
					<rect width="256" height="256" fill="none" />
					<line
						x1="40"
						y1="128"
						x2="216"
						y2="128"
						stroke="currentColor"
						stroke-linecap="round"
						stroke-linejoin="round"
						stroke-width="24"
					/>
					<line
						x1="40"
						y1="64"
						x2="216"
						y2="64"
						stroke="currentColor"
						stroke-linecap="round"
						stroke-linejoin="round"
						stroke-width="24"
					/>
					<line
						x1="40"
						y1="192"
						x2="216"
						y2="192"
						stroke="currentColor"
						stroke-linecap="round"
						stroke-linejoin="round"
						stroke-width="24"
					/>
				</svg>

				<!-- Phosphor Icon: X (Close) -->
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" class="nav-icon icon-close">
					<rect width="256" height="256" fill="none" />
					<line
						x1="200"
						y1="56"
						x2="56"
						y2="200"
						stroke="currentColor"
						stroke-linecap="round"
						stroke-linejoin="round"
						stroke-width="24"
					/>
					<line
						x1="200"
						y1="200"
						x2="56"
						y2="56"
						stroke="currentColor"
						stroke-linecap="round"
						stroke-linejoin="round"
						stroke-width="24"
					/>
				</svg>
			</button>
			<ul class="nav-list">
				<li><a href="/musings" class="nav-link">Musings</a></li>
			</ul>
		</nav>
	</div>
	<script>
		// Pure, simple, minimal state mutation.
		// Catrin Approval Factor: 100%
		const navToggle = document.querySelector(".nav-toggle");
		const mainNav = document.querySelector(".main-nav");

		navToggle.addEventListener("click", () => {
			const isOpen = mainNav.classList.toggle("is-open");
			navToggle.classList.toggle("is-active"); // Toggles icon state
			navToggle.setAttribute("aria-expanded", isOpen);
			navToggle.setAttribute("aria-label", isOpen ? "Close main menu" : "Open main menu");
		});
	</script>
</header>
